<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AlphaLens Trading Bot</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Segoe UI',sans-serif;background:#0f1117;color:#e2e8f0;font-size:14px}
    .app{max-width:1400px;margin:0 auto;padding:16px}
    .header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;padding-bottom:14px;border-bottom:1px solid #1e2433}
    .header h1{font-size:18px;font-weight:600;color:#f1f5f9}
    .pulse{width:8px;height:8px;border-radius:50%;background:#22c55e;display:inline-block;margin-right:8px;animation:pulse 1.5s infinite}
    .pulse.off{background:#ef4444;animation:none}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
    .tabs{display:flex;gap:4px;background:#151a28;border-radius:8px;padding:4px;margin-bottom:20px;flex-wrap:wrap}
    .tab{padding:7px 16px;border-radius:6px;border:none;cursor:pointer;background:transparent;color:#64748b;font-size:13px;transition:all .15s}
    .tab.active{background:#1e293b;color:#f1f5f9;border:1px solid #334155}
    .tab:hover:not(.active){color:#94a3b8}
    .card{background:#1e2433;border:1px solid #2d3748;border-radius:12px;padding:18px;margin-bottom:16px}
    .card h2{font-size:12px;color:#64748b;letter-spacing:.08em;text-transform:uppercase;margin-bottom:14px;font-weight:500}
    .grid4{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:16px}
    .grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:16px}
    .grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:16px}
    .metric{background:#151a28;border-radius:8px;padding:12px 14px}
    .metric .lbl{font-size:10px;color:#64748b;text-transform:uppercase;letter-spacing:.08em;margin-bottom:5px}
    .metric .val{font-size:20px;font-weight:600;font-family:'Courier New',monospace}
    .up{color:#22c55e}.down{color:#ef4444}.neutral{color:#94a3b8}.amber{color:#f59e0b}.orange{color:#f97316}
    .badge{padding:2px 8px;border-radius:4px;font-size:11px;font-weight:500}
    .badge.long{background:#14532d;color:#86efac}
    .badge.short{background:#450a0a;color:#fca5a5}
    .badge.auto{background:#14532d;color:#86efac}
    .badge.manual{background:#1e3a5f;color:#93c5fd}
    .badge.paper{background:#3b2f0a;color:#fcd34d}
    .badge.ok{background:#14532d;color:#86efac}
    .badge.err{background:#450a0a;color:#fca5a5}
    .mode-btn{padding:6px 14px;border-radius:6px;border:1px solid #334155;background:#1e293b;color:#94a3b8;cursor:pointer;font-size:12px}
    .mode-btn:hover{background:#263548}
    .signal-card{background:#151a28;border:1px solid #f59e0b44;border-radius:8px;padding:14px;margin-bottom:10px}
    .signal-levels{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin:10px 0}
    .level{background:#1e2433;border-radius:6px;padding:8px;text-align:center}
    .level .lbl{font-size:9px;color:#64748b;text-transform:uppercase;margin-bottom:3px}
    .level .val{font-size:13px;font-weight:600;font-family:monospace}
    .btn-row{display:flex;gap:8px}
    .btn{padding:7px 18px;border-radius:6px;border:none;cursor:pointer;font-size:12px;font-weight:500}
    .btn-confirm{background:#166534;color:#86efac}
    .btn-reject{background:#7f1d1d;color:#fca5a5}
    .btn:hover{opacity:.85}
    .kill-banner{background:#7f1d1d;border:1px solid #dc2626;border-radius:8px;padding:10px 14px;margin-bottom:14px;display:flex;justify-content:space-between;align-items:center}
    .risk-bar{height:5px;background:#1e2433;border-radius:3px;overflow:hidden;margin-top:6px}
    .risk-bar-fill{height:100%;border-radius:3px;transition:width .5s}
    .empty{color:#475569;font-size:12px;text-align:center;padding:20px}
    .pos-row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid #1e2433;font-size:12px}
    .pos-row:last-child{border-bottom:none}
    .log-box{background:#0a0e17;border:1px solid #1e2433;border-radius:8px;padding:12px;height:320px;overflow-y:auto;font-family:'Courier New',monospace;font-size:11px;line-height:1.6}
    .log-line{padding:1px 0;white-space:pre-wrap;word-break:break-all}
    .log-line.info{color:#64748b}
    .log-line.warn{color:#f59e0b}
    .log-line.error{color:#ef4444}
    .log-line.critical{color:#ff0000;font-weight:bold}
    .log-line.signal{color:#22c55e}
    .log-line.trade{color:#93c5fd}
    .svc-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid #1e2433;font-size:12px}
    .svc-row:last-child{border-bottom:none}
    .svc-dot{width:8px;height:8px;border-radius:50%;margin-right:8px;display:inline-block;flex-shrink:0}
    .bt-table{width:100%;border-collapse:collapse;font-size:11px}
    .bt-table th{color:#64748b;text-align:left;padding:6px 8px;border-bottom:1px solid #1e2433;font-weight:500;font-size:10px;text-transform:uppercase;letter-spacing:.06em}
    .bt-table td{padding:6px 8px;border-bottom:1px solid #111827;color:#cbd5e1}
    .bt-table tr:hover td{background:#151a28}
    .bt-table .good{color:#22c55e}
    .bt-table .bad{color:#ef4444}
    .paper-banner{background:#3b2f0a;border:1px solid #f59e0b44;border-radius:8px;padding:10px 14px;margin-bottom:14px;font-size:12px;color:#fcd34d;display:flex;align-items:center;gap:8px}

    /* ── Signal health widget ── */
    .health-banner{border-radius:8px;padding:12px 16px;margin-bottom:14px;display:flex;align-items:flex-start;gap:14px;font-size:12px}
    .health-banner.ok{background:#0d2218;border:1px solid #16653444}
    .health-banner.caution{background:#2d2200;border:1px solid #f59e0b44}
    .health-banner.warning{background:#2a1500;border:1px solid #f9731644}
    .health-banner.critical{background:#1f0505;border:1px solid #ef444444}
    .health-drought{font-size:28px;font-weight:700;font-family:'Courier New',monospace;line-height:1;flex-shrink:0;min-width:48px;text-align:center}
    .health-blocker{background:#0f1117;border-radius:6px;padding:7px 10px;margin-top:6px;font-size:11px}
    .health-blocker .cat{color:#94a3b8;font-weight:500}
    .health-blocker .hint{color:#64748b;margin-top:2px}

    /* ── Learning & Commodity tables ── */
    .data-table{width:100%;border-collapse:collapse;font-size:11px}
    .data-table th{color:#64748b;text-align:left;padding:6px 8px;border-bottom:1px solid #1e2433;font-weight:500;font-size:10px;text-transform:uppercase;letter-spacing:.06em;white-space:nowrap}
    .data-table td{padding:6px 8px;border-bottom:1px solid #111827;color:#cbd5e1;vertical-align:middle}
    .data-table tr:hover td{background:#151a28}
    .data-table .good{color:#22c55e}
    .data-table .bad{color:#ef4444}
    .data-table .neutral-cell{color:#94a3b8}
    .data-table .sym{font-family:monospace;color:#f1f5f9;font-weight:600}
    .meta-pill{display:inline-block;padding:1px 6px;border-radius:3px;font-size:10px;background:#1e2433;color:#94a3b8;margin-right:3px;font-family:monospace}
    .outcome-strong_win{color:#22c55e;font-weight:600}
    .outcome-small_win{color:#86efac}
    .outcome-scratch{color:#94a3b8}
    .outcome-small_loss{color:#fca5a5}
    .outcome-large_loss{color:#ef4444;font-weight:600}
    .sub-tabs{display:flex;gap:4px;margin-bottom:14px}
    .sub-tab{padding:4px 12px;border-radius:5px;border:1px solid #2d3748;background:transparent;color:#64748b;font-size:12px;cursor:pointer}
    .sub-tab.active{background:#1e293b;color:#f1f5f9;border-color:#334155}
    .source-live{color:#22c55e;font-size:10px}
    .source-sim{color:#f59e0b;font-size:10px}
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const API      = "http://140.245.26.69:8000";
const WS       = "ws://140.245.26.69:8000/ws/live";
const WS_LOGS  = "ws://140.245.26.69:8000/ws/logs";

/* ── helpers ── */
const fmt = n => (n||0).toLocaleString("en-IN",{maximumFractionDigits:0});
const fmtR = r => {
  const v = (r||0).toFixed(2);
  return (r>=0 ? "+" : "") + v + "R";
};
const droughtColor = s => ({OK:"#22c55e",CAUTION:"#f59e0b",WARNING:"#f97316",CRITICAL:"#ef4444"}[s]||"#94a3b8");
const outcomeLabel = b => ({strong_win:"Strong Win",small_win:"Small Win",scratch:"Scratch",small_loss:"Small Loss",large_loss:"Large Loss"}[b]||b);

function App() {
  const [data, setData]               = React.useState(null);
  const [wsOk, setWsOk]               = React.useState(false);
  const [tab, setTab]                 = React.useState("trading");
  const [logs, setLogs]               = React.useState([]);
  const [services, setServices]       = React.useState(null);
  const [backtest, setBacktest]       = React.useState(null);
  const [btStrat, setBtStrat]         = React.useState(null);
  const [paperStats, setPaperStats]   = React.useState(null);
  const [paperPos, setPaperPos]       = React.useState([]);

  /* signal health */
  const [drought, setDrought]         = React.useState(null);

  /* learning */
  const [learnStats, setLearnStats]   = React.useState(null);
  const [learnTrades, setLearnTrades] = React.useState([]);
  const [learnReview, setLearnReview] = React.useState(null);
  const [learnSubTab, setLearnSubTab] = React.useState("trades");

  /* learning filters */
  const [lrnFilterSym,    setLrnFilterSym]    = React.useState("");
  const [lrnFilterStrat,  setLrnFilterStrat]  = React.useState("all");
  const [lrnFilterDir,    setLrnFilterDir]    = React.useState("all");
  const [lrnFilterStatus, setLrnFilterStatus] = React.useState("all");
  const [lrnFilterDate,   setLrnFilterDate]   = React.useState("");
  const [lrnSortCol,      setLrnSortCol]      = React.useState("entry_time");
  const [lrnSortAsc,      setLrnSortAsc]      = React.useState(false);

  /* commodity */
  const [commStats, setCommStats]     = React.useState(null);
  const [commTrades, setCommTrades]   = React.useState([]);
  const [commSubTab, setCommSubTab]   = React.useState("trades");

  const logRef = React.useRef(null);

  /* ── live WS ── */
  React.useEffect(() => {
    let ws;
    function connect() {
      ws = new WebSocket(WS);
      ws.onopen    = () => setWsOk(true);
      ws.onclose   = () => { setWsOk(false); setTimeout(connect, 3000); };
      ws.onerror   = () => setWsOk(false);
      ws.onmessage = e => { try { setData(JSON.parse(e.data)); } catch{} };
    }
    connect();
    return () => ws && ws.close();
  }, []);

  /* ── log WS ── */
  React.useEffect(() => {
    let ws;
    function connectLogs() {
      ws = new WebSocket(WS_LOGS);
      ws.onmessage = e => {
        setLogs(prev => [e.data, ...prev].slice(0, 200));
      };
      ws.onclose = () => setTimeout(connectLogs, 3000);
    }
    connectLogs();
    return () => ws && ws.close();
  }, []);

  /* ── polling fetches ── */
  React.useEffect(() => {
    const loadServices = () =>
      fetch(`${API}/services/status`).then(r=>r.json()).then(setServices).catch(()=>{});
    const loadBacktest = () =>
      fetch(`${API}/backtest/results`).then(r=>r.json()).then(d=>{
        setBacktest(d);
        if (d.strategies) setBtStrat(Object.keys(d.strategies)[0]);
      }).catch(()=>{});
    const loadPaper = () => {
      fetch(`${API}/paper/stats`).then(r=>r.json()).then(setPaperStats).catch(()=>{});
      fetch(`${API}/paper/positions`).then(r=>r.json()).then(setPaperPos).catch(()=>{});
    };
    const loadDrought = () =>
      fetch(`${API}/signals/drought`).then(r=>r.json()).then(setDrought).catch(()=>{});
    const loadLearn = () => {
      fetch(`${API}/learning/stats`).then(r=>r.json()).then(setLearnStats).catch(()=>{});
      fetch(`${API}/learning/trades?limit=100`).then(r=>r.json()).then(d=>setLearnTrades(d.trades||[])).catch(()=>{});
      fetch(`${API}/learning/review`).then(r=>r.json()).then(setLearnReview).catch(()=>{});
    };
    const loadComm = () => {
      fetch(`${API}/commodity/stats`).then(r=>r.json()).then(setCommStats).catch(()=>{});
      fetch(`${API}/commodity/trades?limit=100`).then(r=>r.json()).then(d=>setCommTrades(d.trades||[])).catch(()=>{});
    };

    loadServices(); loadBacktest(); loadPaper(); loadDrought(); loadLearn(); loadComm();

    const t1 = setInterval(loadServices, 15000);
    const t2 = setInterval(loadPaper,    5000);
    const t3 = setInterval(loadDrought,  60000);
    const t4 = setInterval(loadLearn,    30000);
    const t5 = setInterval(loadComm,     60000);
    return () => [t1,t2,t3,t4,t5].forEach(clearInterval);
  }, []);

  const switchMode = m => fetch(`${API}/mode/${m}`, {method:"POST"});
  const confirm    = id => fetch(`${API}/signals/${id}/confirm`, {method:"POST"});
  const reject     = id => fetch(`${API}/signals/${id}/reject`, {method:"POST"});
  const resetKill  = () => fetch(`${API}/kill-switch/reset`, {method:"POST"});

  const { stats, risk, positions, pending_signals, mode } = data || {};
  const pnl    = stats?.total_pnl || 0;
  const pnlPct = stats?.total_pnl_pct || 0;
  const heat   = (positions||[]).reduce((s,p)=>s+(p.capital_at_risk||0),0) / ((stats?.total_capital||1)) * 100;
  const isPaper = mode === "AUTO" && paperStats?.mode === "PAPER";

  const logColor = line => {
    if (line.includes("CRITICAL") || line.includes("ERROR")) return "error";
    if (line.includes("WARNING")) return "warn";
    if (line.includes("SIGNAL") || line.includes("signal")) return "signal";
    if (line.includes("TRADE") || line.includes("PAPER") || line.includes("ORDER")) return "trade";
    return "info";
  };

  /* ── signal health mini-widget ── */
  function SignalHealthWidget() {
    if (!drought) return null;
    const { drought_days, drought_status, last_trade, top_3_reasons } = drought;
    if (drought_status === "OK") return (
      <div className="health-banner ok" style={{marginBottom:14}}>
        <span style={{color:"#22c55e",fontWeight:600}}>✓ Signals healthy</span>
        <span style={{color:"#475569",marginLeft:10,fontSize:11}}>Last trade: {last_trade||"—"}</span>
      </div>
    );
    const cls = (drought_status||"warning").toLowerCase();
    const col = droughtColor(drought_status);
    return (
      <div className={`health-banner ${cls}`}>
        <div style={{textAlign:"center",flexShrink:0}}>
          <div className="health-drought" style={{color:col}}>{drought_days}</div>
          <div style={{fontSize:9,color:"#64748b",textTransform:"uppercase",marginTop:2}}>days dry</div>
        </div>
        <div style={{flex:1}}>
          <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:6}}>
            <span style={{fontWeight:600,fontSize:13,color:col}}>{drought_status}</span>
            <span style={{fontSize:11,color:"#475569"}}>No trades fired · Last: {last_trade||"—"}</span>
          </div>
          {(top_3_reasons||[]).map((b,i)=>(
            <div key={i} className="health-blocker">
              <div className="cat">#{i+1} — {b.category?.replace(/_/g," ")}</div>
              <div className="hint">{b.hint}</div>
            </div>
          ))}
        </div>
      </div>
    );
  }

  /* ── learning trades table (with filter/sort controls) ── */
  function LearningTradesTable({trades, showControls}) {
    if (!trades.length) return <div className="empty">No learning trades yet</div>;

    /* derive filter options from the dataset passed in */
    const strategies = ["all", ...Array.from(new Set(trades.map(t=>t.strategy).filter(Boolean)))];

    /* apply filters */
    let rows = trades.filter(t => {
      const sym = (t.symbol||"").replace("NSE:","").replace("-EQ","").replace("MCX:","");
      if (lrnFilterSym    && !sym.toLowerCase().includes(lrnFilterSym.toLowerCase())) return false;
      if (lrnFilterStrat  !== "all" && t.strategy !== lrnFilterStrat) return false;
      if (lrnFilterDir    !== "all" && t.direction !== lrnFilterDir)  return false;
      if (lrnFilterStatus !== "all" && t.status    !== lrnFilterStatus) return false;
      if (lrnFilterDate) {
        const d = (t.entry_time||"").slice(0,10);
        if (d !== lrnFilterDate) return false;
      }
      return true;
    });

    /* sort */
    const numCols = new Set(["entry_price","exit_price","stop_loss","target","pnl_pts","pnl_r","mae_pts","mfe_pts"]);
    rows = [...rows].sort((a, b) => {
      let va = a[lrnSortCol] ?? "", vb = b[lrnSortCol] ?? "";
      if (numCols.has(lrnSortCol)) { va = Number(va)||0; vb = Number(vb)||0; }
      else { va = String(va); vb = String(vb); }
      if (va < vb) return lrnSortAsc ? -1 : 1;
      if (va > vb) return lrnSortAsc ?  1 : -1;
      return 0;
    });

    function SortTh({col, label}) {
      const active = lrnSortCol === col;
      return (
        <th style={{cursor:"pointer",userSelect:"none",whiteSpace:"nowrap"}}
            onClick={()=>{ if(active) setLrnSortAsc(p=>!p); else { setLrnSortCol(col); setLrnSortAsc(true); } }}>
          {label} {active ? (lrnSortAsc ? "↑" : "↓") : <span style={{opacity:0.3}}>↕</span>}
        </th>
      );
    }

    const inputStyle = {
      background:"#0f1623", border:"1px solid #1e2433", borderRadius:4,
      color:"#e2e8f0", padding:"3px 7px", fontSize:11
    };

    return (
      <div>
        {showControls !== false && (
          <div style={{display:"flex",flexWrap:"wrap",gap:8,marginBottom:10,alignItems:"center"}}>
            <input
              type="text" placeholder="Symbol…" value={lrnFilterSym}
              onChange={e=>setLrnFilterSym(e.target.value)}
              style={{...inputStyle, width:110}}
            />
            <select value={lrnFilterStrat} onChange={e=>setLrnFilterStrat(e.target.value)} style={inputStyle}>
              {strategies.map(s=><option key={s} value={s}>{s==="all"?"All strategies":s}</option>)}
            </select>
            <select value={lrnFilterDir} onChange={e=>setLrnFilterDir(e.target.value)} style={inputStyle}>
              <option value="all">All dirs</option>
              <option value="LONG">LONG</option>
              <option value="SHORT">SHORT</option>
            </select>
            <select value={lrnFilterStatus} onChange={e=>setLrnFilterStatus(e.target.value)} style={inputStyle}>
              <option value="all">All status</option>
              <option value="OPEN">OPEN</option>
              <option value="CLOSED">CLOSED</option>
            </select>
            <input
              type="date" value={lrnFilterDate}
              onChange={e=>setLrnFilterDate(e.target.value)}
              style={{...inputStyle, colorScheme:"dark"}}
            />
            {(lrnFilterSym||lrnFilterStrat!=="all"||lrnFilterDir!=="all"||lrnFilterStatus!=="all"||lrnFilterDate) && (
              <button style={{...inputStyle,cursor:"pointer",color:"#f59e0b"}}
                onClick={()=>{setLrnFilterSym("");setLrnFilterStrat("all");setLrnFilterDir("all");setLrnFilterStatus("all");setLrnFilterDate("");}}>
                ✕ Clear
              </button>
            )}
            <span style={{marginLeft:"auto",color:"#475569",fontSize:11}}>{rows.length} / {trades.length} rows</span>
          </div>
        )}
        <div style={{overflowX:"auto"}}>
          <table className="data-table">
            <thead>
              <tr>
                <SortTh col="symbol"      label="Symbol"/>
                <SortTh col="strategy"    label="Strategy"/>
                <SortTh col="direction"   label="Dir"/>
                <SortTh col="entry_time"  label="Date"/>
                <SortTh col="entry_price" label="Entry"/>
                <SortTh col="exit_price"  label="Exit"/>
                <SortTh col="stop_loss"   label="SL"/>
                <SortTh col="target"      label="Target"/>
                <SortTh col="pnl_pts"     label="Pts"/>
                <SortTh col="pnl_r"       label="P&L (R)"/>
                <SortTh col="mae_pts"     label="MAE"/>
                <SortTh col="mfe_pts"     label="MFE"/>
                <SortTh col="exit_reason" label="Reason"/>
                <SortTh col="status"      label="Status"/>
              </tr>
            </thead>
            <tbody>
              {rows.map(t=>{
                const r    = t.pnl_r||0;
                const pts  = t.pnl_pts||0;
                const open = t.status==="OPEN";
                const dateStr = (t.entry_time||"").slice(0,10);
                return (
                  <tr key={t.id}>
                    <td className="sym">{(t.symbol||"").replace("NSE:","").replace("-EQ","").replace("MCX:","")}</td>
                    <td style={{color:"#93c5fd",fontSize:10}}>{t.strategy}</td>
                    <td><span className={`badge ${(t.direction||"").toLowerCase()}`}>{t.direction}</span></td>
                    <td style={{color:"#64748b",fontSize:10}}>{dateStr}</td>
                    <td style={{fontFamily:"monospace"}}>{(t.entry_price||0).toFixed(2)}</td>
                    <td style={{fontFamily:"monospace"}}>{t.exit_price ? t.exit_price.toFixed(2) : "—"}</td>
                    <td style={{fontFamily:"monospace",color:"#fca5a5"}}>{(t.stop_loss||0).toFixed(2)}</td>
                    <td style={{fontFamily:"monospace",color:"#86efac"}}>{(t.target||0).toFixed(2)}</td>
                    <td className={open?"neutral-cell":pts>0?"good":pts<0?"bad":"neutral-cell"} style={{fontFamily:"monospace"}}>
                      {open ? "open" : `${pts>=0?"+":""}${pts.toFixed(2)}`}
                    </td>
                    <td className={open?"neutral-cell":r>0?"good":r<0?"bad":"neutral-cell"} style={{fontFamily:"monospace",fontWeight:600}}>{open?"open":fmtR(r)}</td>
                    <td style={{fontFamily:"monospace",color:"#fca5a5",fontSize:10}}>{(t.mae_pts||0)>0?`-${(t.mae_pts||0).toFixed(2)}`:"—"}</td>
                    <td style={{fontFamily:"monospace",color:"#86efac",fontSize:10}}>{(t.mfe_pts||0)>0?`+${(t.mfe_pts||0).toFixed(2)}`:"—"}</td>
                    <td style={{color:"#64748b",fontSize:10}}>{t.exit_reason||"—"}</td>
                    <td><span className={`badge ${open?"manual":"ok"}`} style={{fontSize:9}}>{t.status}</span></td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>
      </div>
    );
  }

  /* ── learning review by outcome ── */
  function LearningReviewView() {
    if (!learnReview) return <div className="empty">Loading...</div>;
    const buckets = ["strong_win","small_win","scratch","small_loss","large_loss"];
    const byOutcome = learnReview.by_outcome || {};
    return (
      <div>
        {buckets.map(b => {
          const trades = byOutcome[b] || [];
          if (!trades.length) return null;
          return (
            <div key={b} style={{marginBottom:16}}>
              <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:8}}>
                <span className={`outcome-${b}`} style={{fontWeight:600,fontSize:13}}>{outcomeLabel(b)}</span>
                <span style={{color:"#475569",fontSize:11}}>{trades.length} trade{trades.length!==1?"s":""}</span>
              </div>
              <LearningTradesTable trades={trades.slice(0,10)} showControls={false}/>
            </div>
          );
        })}
        {!Object.keys(byOutcome).length && <div className="empty">No closed trades to review yet</div>}
      </div>
    );
  }

  /* ── commodity trades table ── */
  function CommodityTradesTable({trades}) {
    if (!trades.length) return <div className="empty">No commodity option trades yet — engine runs during MCX hours (09:00–23:30 IST)</div>;
    return (
      <div style={{overflowX:"auto"}}>
        <table className="data-table">
          <thead>
            <tr>
              <th>Instrument</th><th>Dir</th><th>ATM Strike</th>
              <th>Net Debit</th><th>Max Profit</th><th>RR</th>
              <th>P&L (R)</th><th>Reason</th><th>Source</th><th>Status</th>
            </tr>
          </thead>
          <tbody>
            {trades.map(t=>{
              const r = t.pnl_r||0;
              const meta = t.metadata||{};
              return (
                <tr key={t.id}>
                  <td className="sym">{(t.instrument||"").replace("MCX:","")}</td>
                  <td><span className={`badge ${(t.direction||"").toLowerCase()}`}>{t.direction}</span></td>
                  <td style={{fontFamily:"monospace"}}>{meta.atm_strike||"—"}</td>
                  <td style={{fontFamily:"monospace",color:"#fca5a5"}}>{(t.net_debit||0).toFixed(2)}</td>
                  <td style={{fontFamily:"monospace",color:"#86efac"}}>{(t.max_profit||0).toFixed(2)}</td>
                  <td style={{fontFamily:"monospace"}}>{(t.rr_planned||0).toFixed(1)}</td>
                  <td className={r>0?"good":r<0?"bad":"neutral-cell"} style={{fontFamily:"monospace",fontWeight:600}}>{t.status==="OPEN"?"open":fmtR(r)}</td>
                  <td style={{color:"#64748b",fontSize:10}}>{t.exit_reason||"—"}</td>
                  <td><span className={t.data_source==="live_chain"?"source-live":"source-sim"}>{t.data_source==="live_chain"?"● Live":"◌ Sim"}</span></td>
                  <td><span className={`badge ${t.status==="OPEN"?"manual":"ok"}`} style={{fontSize:9}}>{t.status}</span></td>
                </tr>
              );
            })}
          </tbody>
        </table>
      </div>
    );
  }

  return (
    <div className="app">

      {/* ── Header ── */}
      <div className="header">
        <div>
          <span className={`pulse ${wsOk?"":"off"}`}/>
          <span style={{fontSize:18,fontWeight:600,color:"#f1f5f9"}}>AlphaLens Trading Bot</span>
          <span style={{fontSize:11,color:"#475569",marginLeft:10}}>{wsOk?"● Live":"○ Reconnecting..."}</span>
          {isPaper && <span className="badge paper" style={{marginLeft:10}}>PAPER TRADING</span>}
        </div>
        <div style={{display:"flex",gap:8,alignItems:"center"}}>
          <span className={`badge ${(mode||"").toLowerCase()}`}>{mode||"--"}</span>
          <button className="mode-btn" onClick={()=>switchMode("AUTO")}>AUTO</button>
          <button className="mode-btn" onClick={()=>switchMode("MANUAL")}>MANUAL</button>
        </div>
      </div>

      {/* ── Tabs ── */}
      <div className="tabs">
        {[["trading","Trading"],["paper","Paper P&L"],["learning","Learning"],["commodity","MCX Options"],["logs","Live Logs"],["services","Services"],["backtest","Backtest"]].map(([id,label])=>(
          <button key={id} className={`tab ${tab===id?"active":""}`} onClick={()=>setTab(id)}>{label}</button>
        ))}
      </div>

      {/* ════════════════════════════════════════
          TRADING TAB
      ════════════════════════════════════════ */}
      {tab==="trading" && (
        <div>
          {risk?.kill_switch_active && (
            <div className="kill-banner">
              <span>🚨 KILL SWITCH — {risk.kill_switch_reason}</span>
              <button className="btn" style={{background:"#dc2626",color:"#fff"}} onClick={resetKill}>Reset</button>
            </div>
          )}

          <SignalHealthWidget/>

          <div className="grid4">
            <div className="metric"><div className="lbl">Portfolio value</div>
              <div className={`val ${pnl>=0?"up":"down"}`}>₹{fmt(stats?.portfolio_value)}</div></div>
            <div className="metric"><div className="lbl">Total P&L</div>
              <div className={`val ${pnl>=0?"up":"down"}`}>{pnl>=0?"+":""}₹{fmt(Math.abs(pnl))} <span style={{fontSize:13}}>({pnlPct>=0?"+":""}{pnlPct.toFixed(1)}%)</span></div></div>
            <div className="metric"><div className="lbl">Win rate</div>
              <div className="val neutral">{stats?.win_rate?.toFixed(0)||0}%</div></div>
            <div className="metric"><div className="lbl">Drawdown</div>
              <div className={`val ${(stats?.drawdown_pct||0)>2?"down":"neutral"}`}>{stats?.drawdown_pct?.toFixed(1)||0}%</div></div>
          </div>

          <div className="grid2">
            <div className="card">
              <h2>Open positions ({positions?.length||0})</h2>
              {!positions?.length ? <div className="empty">No open positions</div>
              : positions.map(p=>(
                <div key={p.id} className="pos-row">
                  <div>
                    <span style={{fontWeight:600,fontFamily:"monospace",color:"#f1f5f9"}}>{p.symbol.replace("NSE:","").replace("-EQ","")}</span>
                    <span className={`badge ${p.direction.toLowerCase()}`} style={{marginLeft:6}}>{p.direction}</span>
                    <div style={{fontSize:10,color:"#64748b",marginTop:2}}>{p.strategy} · {p.position_size} shares</div>
                  </div>
                  <div style={{textAlign:"right"}}>
                    <div className={p.unrealised_pnl>=0?"up":"down"} style={{fontSize:15,fontWeight:600}}>
                      {p.unrealised_pnl>=0?"+":""}₹{fmt(Math.abs(p.unrealised_pnl))}
                    </div>
                    <div style={{fontSize:10,color:"#64748b"}}>₹{p.entry_price} → ₹{p.ltp}</div>
                  </div>
                </div>
              ))}
            </div>
            <div className="card">
              <h2>Risk metrics</h2>
              <div style={{display:"grid",gap:10}}>
                <div>
                  <div style={{display:"flex",justifyContent:"space-between",fontSize:12}}>
                    <span style={{color:"#64748b"}}>Portfolio heat</span>
                    <span className={heat>50?"down":"neutral"}>{heat.toFixed(1)}%</span>
                  </div>
                  <div className="risk-bar"><div className="risk-bar-fill" style={{width:`${Math.min(heat,100)}%`,background:heat>50?"#ef4444":heat>30?"#f59e0b":"#22c55e"}}/></div>
                </div>
                {[["Daily P&L",`₹${fmt(risk?.daily_realised_pnl)}`,risk?.daily_realised_pnl>=0?"up":"down"],
                  ["Daily loss limit",`${risk?.daily_loss_limit}%`,"neutral"],
                  ["Risk per trade",`${risk?.risk_per_trade_pct}%`,"neutral"],
                  ["Open positions",stats?.open_positions_count||0,"neutral"],
                  ["Total trades",stats?.total_trades||0,"neutral"],
                  ["Avg R:R",stats?.avg_rr?.toFixed(2)||"—","neutral"],
                ].map(([lbl,val,cls])=>(
                  <div key={lbl} style={{display:"flex",justifyContent:"space-between",fontSize:12}}>
                    <span style={{color:"#64748b"}}>{lbl}</span>
                    <span className={cls}>{val}</span>
                  </div>
                ))}
              </div>
            </div>
          </div>

          <div className="card">
            <h2>Signals awaiting confirmation ({pending_signals?.length||0})</h2>
            {!pending_signals?.length ? <div className="empty">No pending signals — bot is scanning markets</div>
            : pending_signals.map(s=>(
              <div key={s.signal_id} className="signal-card">
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                  <span style={{fontWeight:600,color:"#f1f5f9"}}>{s.symbol.replace("NSE:","").replace("-EQ","")} — {s.direction}</span>
                  <div style={{display:"flex",gap:6,alignItems:"center"}}>
                    <span style={{fontSize:11,color:"#f59e0b"}}>{(s.confidence*100).toFixed(0)}% conf</span>
                    <span className="badge manual">{s.strategy}</span>
                  </div>
                </div>
                <div style={{fontSize:11,color:"#64748b",margin:"6px 0"}}>{s.reason}</div>
                <div className="signal-levels">
                  <div className="level"><div className="lbl">Entry</div><div className="val" style={{color:"#93c5fd"}}>₹{s.entry}</div></div>
                  <div className="level"><div className="lbl">Stop</div><div className="val" style={{color:"#fca5a5"}}>₹{s.stop_loss}</div></div>
                  <div className="level"><div className="lbl">Target</div><div className="val" style={{color:"#86efac"}}>₹{s.target_1}</div></div>
                </div>
                <div style={{fontSize:11,color:"#64748b",marginBottom:10}}>R:R {s.risk_reward} · {s.position_size} shares · ₹{(s.capital_at_risk||0).toLocaleString("en-IN")}</div>
                <div className="btn-row">
                  <button className="btn btn-confirm" onClick={()=>confirm(s.signal_id)}>✓ Confirm</button>
                  <button className="btn btn-reject" onClick={()=>reject(s.signal_id)}>✕ Reject</button>
                </div>
              </div>
            ))}
          </div>
        </div>
      )}

      {/* ════════════════════════════════════════
          PAPER P&L TAB
      ════════════════════════════════════════ */}
      {tab==="paper" && (
        <div>
          <div className="paper-banner">
            📝 Paper trading mode — all trades are simulated. No real money at risk.
          </div>
          {paperStats ? (
            <div>
              <div className="grid4">
                <div className="metric"><div className="lbl">Total P&L</div>
                  <div className={`val ${(paperStats.total_pnl||0)>=0?"up":"down"}`}>
                    {(paperStats.total_pnl||0)>=0?"+":""}₹{fmt(Math.abs(paperStats.total_pnl||0))}
                  </div></div>
                <div className="metric"><div className="lbl">Win rate</div>
                  <div className={`val ${(paperStats.win_rate||0)>=50?"up":"down"}`}>{paperStats.win_rate||0}%</div></div>
                <div className="metric"><div className="lbl">Profit factor</div>
                  <div className={`val ${(paperStats.profit_factor||0)>=1.5?"up":(paperStats.profit_factor||0)>=1?"neutral":"down"}`}>{paperStats.profit_factor||0}</div></div>
                <div className="metric"><div className="lbl">Total trades</div>
                  <div className="val neutral">{paperStats.total_trades||0}</div></div>
              </div>
              <div className="grid2">
                <div className="card">
                  <h2>Performance</h2>
                  {[["Realised P&L",`₹${fmt(paperStats.total_realised)}`,(paperStats.total_realised||0)>=0?"up":"down"],
                    ["Unrealised P&L",`₹${fmt(paperStats.total_unrealised)}`,(paperStats.total_unrealised||0)>=0?"up":"down"],
                    ["Return %",`${paperStats.total_pnl_pct||0}%`,(paperStats.total_pnl_pct||0)>=0?"up":"down"],
                    ["Avg winner",`₹${fmt(paperStats.avg_winner)}`,"up"],
                    ["Avg loser",`₹${fmt(paperStats.avg_loser)}`,"down"],
                    ["Open positions",paperStats.open_positions||0,"neutral"],
                  ].map(([lbl,val,cls])=>(
                    <div key={lbl} style={{display:"flex",justifyContent:"space-between",padding:"6px 0",borderBottom:"1px solid #111827",fontSize:12}}>
                      <span style={{color:"#64748b"}}>{lbl}</span>
                      <span className={cls}>{val}</span>
                    </div>
                  ))}
                </div>
                <div className="card">
                  <h2>Open paper positions ({paperPos.length})</h2>
                  {!paperPos.length ? <div className="empty">No open paper positions</div>
                  : paperPos.map(p=>(
                    <div key={p.id} className="pos-row">
                      <div>
                        <span style={{fontWeight:600,fontFamily:"monospace"}}>{p.symbol.replace("NSE:","").replace("-EQ","")}</span>
                        <span className={`badge ${p.direction.toLowerCase()}`} style={{marginLeft:6}}>{p.direction}</span>
                        <div style={{fontSize:10,color:"#64748b",marginTop:2}}>{p.strategy}</div>
                      </div>
                      <div style={{textAlign:"right"}}>
                        <div className={p.unrealised_pnl>=0?"up":"down"} style={{fontWeight:600}}>
                          {p.unrealised_pnl>=0?"+":""}₹{fmt(Math.abs(p.unrealised_pnl))}
                        </div>
                        <div style={{fontSize:10,color:"#64748b"}}>₹{p.entry_price} → ₹{p.ltp}</div>
                      </div>
                    </div>
                  ))}
                </div>
              </div>
            </div>
          ) : <div className="empty">Loading paper trading stats...</div>}
        </div>
      )}

      {/* ════════════════════════════════════════
          LEARNING TAB
      ════════════════════════════════════════ */}
      {tab==="learning" && (
        <div>
          <div className="paper-banner">
            🎓 Learning paper trades — SimpleRSI &amp; SimpleMomentum on NSE stocks &amp; indices. No real money.
          </div>

          {/* stats row */}
          {learnStats && !learnStats.message ? (
            <div className="grid4" style={{marginBottom:16}}>
              <div className="metric"><div className="lbl">Closed trades</div>
                <div className="val neutral">{learnStats.total_closed||0}</div></div>
              <div className="metric"><div className="lbl">Win rate</div>
                <div className={`val ${(learnStats.win_rate_pct||0)>=50?"up":"down"}`}>{learnStats.win_rate_pct||0}%</div></div>
              <div className="metric"><div className="lbl">Avg R</div>
                <div className={`val ${(learnStats.avg_r||0)>=0?"up":"down"}`}>{(learnStats.avg_r||0)>=0?"+":""}{(learnStats.avg_r||0).toFixed(2)}R</div></div>
              <div className="metric"><div className="lbl">Total R</div>
                <div className={`val ${(learnStats.total_r||0)>=0?"up":"down"}`}>{(learnStats.total_r||0)>=0?"+":""}{(learnStats.total_r||0).toFixed(1)}R</div></div>
            </div>
          ) : (
            <div className="card"><div className="empty">{learnStats?.message||"Loading stats..."}</div></div>
          )}

          {/* per-strategy breakdown */}
          {learnStats?.by_strategy && (
            <div className="grid2" style={{marginBottom:16}}>
              {Object.entries(learnStats.by_strategy).map(([name, s])=>(
                <div key={name} className="card">
                  <h2>{name}</h2>
                  <div style={{display:"grid",gap:8}}>
                    {[["Trades", s.total, "neutral"],
                      ["Win rate", `${s.win_rate}%`, s.win_rate>=50?"up":"down"],
                      ["Avg R", `${s.avg_r>=0?"+":""}${s.avg_r}R`, s.avg_r>=0?"up":"down"],
                      ["Wins / Losses", `${s.wins} / ${s.total-s.wins}`, "neutral"],
                    ].map(([lbl,val,cls])=>(
                      <div key={lbl} style={{display:"flex",justifyContent:"space-between",fontSize:12}}>
                        <span style={{color:"#64748b"}}>{lbl}</span>
                        <span className={cls}>{val}</span>
                      </div>
                    ))}
                  </div>
                </div>
              ))}
            </div>
          )}

          {/* sub-tabs */}
          <div className="sub-tabs">
            {[["trades","All Trades"],["review","Review by Outcome"],["meta","Exit Breakdown"]].map(([id,lbl])=>(
              <button key={id} className={`sub-tab ${learnSubTab===id?"active":""}`} onClick={()=>setLearnSubTab(id)}>{lbl}</button>
            ))}
          </div>

          {learnSubTab==="trades" && (
            <div className="card">
              <h2>Recent trades</h2>
              <LearningTradesTable trades={learnTrades} showControls={true}/>
            </div>
          )}

          {learnSubTab==="review" && (
            <div className="card">
              <h2>Trades by outcome bucket</h2>
              <LearningReviewView/>
            </div>
          )}

          {learnSubTab==="meta" && learnStats && (
            <div className="grid2">
              <div className="card">
                <h2>Exit reasons</h2>
                {learnStats.exit_reasons ? Object.entries(learnStats.exit_reasons).sort((a,b)=>b[1]-a[1]).map(([r,n])=>(
                  <div key={r} style={{display:"flex",justifyContent:"space-between",padding:"5px 0",borderBottom:"1px solid #111827",fontSize:12}}>
                    <span style={{color:"#94a3b8"}}>{r}</span>
                    <span className={r==="TARGET"?"up":r==="STOP"?"down":"neutral"}>{n}</span>
                  </div>
                )) : <div className="empty">No data</div>}
              </div>
              <div className="card">
                <h2>Direction split</h2>
                {learnStats.directions ? Object.entries(learnStats.directions).map(([d,n])=>(
                  <div key={d} style={{display:"flex",justifyContent:"space-between",padding:"5px 0",borderBottom:"1px solid #111827",fontSize:12}}>
                    <span className={`badge ${d.toLowerCase()}`}>{d}</span>
                    <span className="neutral">{n} trades</span>
                  </div>
                )) : <div className="empty">No data</div>}
                {learnStats.best_trade_r !== undefined && (
                  <div style={{marginTop:12,display:"grid",gap:6}}>
                    {[["Best trade",`+${learnStats.best_trade_r}R`,"up"],
                      ["Worst trade",`${learnStats.worst_trade_r}R`,"down"],
                    ].map(([lbl,val,cls])=>(
                      <div key={lbl} style={{display:"flex",justifyContent:"space-between",fontSize:12}}>
                        <span style={{color:"#64748b"}}>{lbl}</span>
                        <span className={cls} style={{fontFamily:"monospace"}}>{val}</span>
                      </div>
                    ))}
                  </div>
                )}
              </div>
            </div>
          )}
        </div>
      )}

      {/* ════════════════════════════════════════
          MCX COMMODITY OPTIONS TAB
      ════════════════════════════════════════ */}
      {tab==="commodity" && (
        <div>
          <div className="paper-banner" style={{background:"#0d1f35",borderColor:"#1e3a5f44",color:"#93c5fd"}}>
            🛢 MCX commodity options paper trades — ATM debit spreads · Live chain + Black-Scholes fallback · 09:00–23:30 IST
          </div>

          {/* stats row */}
          {commStats && !commStats.message ? (
            <div className="grid4" style={{marginBottom:16}}>
              <div className="metric"><div className="lbl">Closed trades</div>
                <div className="val neutral">{commStats.total_closed||0}</div></div>
              <div className="metric"><div className="lbl">Open now</div>
                <div className="val neutral">{commStats.total_open||0}</div></div>
              <div className="metric"><div className="lbl">Win rate</div>
                <div className={`val ${(commStats.win_rate_pct||0)>=50?"up":"down"}`}>{commStats.win_rate_pct||0}%</div></div>
              <div className="metric"><div className="lbl">Total R</div>
                <div className={`val ${(commStats.total_r||0)>=0?"up":"down"}`}>{(commStats.total_r||0)>=0?"+":""}{(commStats.total_r||0).toFixed(1)}R</div></div>
            </div>
          ) : (
            <div className="card"><div className="empty">{commStats?.message||"Loading stats... Engine runs during MCX hours."}</div></div>
          )}

          {/* per-instrument breakdown */}
          {commStats?.by_instrument && Object.keys(commStats.by_instrument).length > 0 && (
            <div className="card" style={{marginBottom:16}}>
              <h2>By instrument</h2>
              <table className="data-table">
                <thead>
                  <tr><th>Instrument</th><th>Trades</th><th>Win %</th><th>Avg R</th><th>Wins</th></tr>
                </thead>
                <tbody>
                  {Object.entries(commStats.by_instrument).sort((a,b)=>b[1].total-a[1].total).map(([ins,s])=>(
                    <tr key={ins}>
                      <td className="sym">{ins.replace("MCX:","")}</td>
                      <td>{s.total}</td>
                      <td className={s.win_rate>=50?"good":"bad"}>{s.win_rate}%</td>
                      <td className={s.avg_r>=0?"good":"bad"} style={{fontFamily:"monospace"}}>{s.avg_r>=0?"+":""}{s.avg_r}R</td>
                      <td className="neutral-cell">{s.wins}</td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          )}

          {/* data source note */}
          {commStats?.data_sources && (
            <div style={{display:"flex",gap:16,marginBottom:12,fontSize:11}}>
              {commStats.data_sources.live_chain && <span><span className="source-live">●</span> Live chain: {commStats.data_sources.live_chain} trades</span>}
              {commStats.data_sources.black_scholes && <span><span className="source-sim">◌</span> Black-Scholes sim: {commStats.data_sources.black_scholes} trades</span>}
            </div>
          )}

          {/* sub-tabs */}
          <div className="sub-tabs">
            {[["trades","All Trades"],["open","Open Positions"],["exits","Exit Breakdown"]].map(([id,lbl])=>(
              <button key={id} className={`sub-tab ${commSubTab===id?"active":""}`} onClick={()=>setCommSubTab(id)}>{lbl}</button>
            ))}
          </div>

          {commSubTab==="trades" && (
            <div className="card">
              <h2>Recent trades ({commTrades.length})</h2>
              <CommodityTradesTable trades={commTrades}/>
            </div>
          )}

          {commSubTab==="open" && (
            <div className="card">
              <h2>Open positions ({commStats?.open_positions?.length||0})</h2>
              {commStats?.open_positions?.length ? (
                <CommodityTradesTable trades={commStats.open_positions}/>
              ) : <div className="empty">No open commodity option positions</div>}
            </div>
          )}

          {commSubTab==="exits" && commStats && (
            <div className="grid2">
              <div className="card">
                <h2>Exit reasons</h2>
                {commStats.exit_reasons ? Object.entries(commStats.exit_reasons).sort((a,b)=>b[1]-a[1]).map(([r,n])=>(
                  <div key={r} style={{display:"flex",justifyContent:"space-between",padding:"5px 0",borderBottom:"1px solid #111827",fontSize:12}}>
                    <span style={{color:"#94a3b8"}}>{r}</span>
                    <span className={r==="TARGET_50PCT"?"up":r.includes("LOSS")||r==="EOD_MCX"?"down":"neutral"}>{n}</span>
                  </div>
                )) : <div className="empty">No data</div>}
              </div>
              <div className="card">
                <h2>P&L summary</h2>
                {commStats.total_closed>0 && (
                  <div style={{display:"grid",gap:8}}>
                    {[["Avg R", `${(commStats.avg_r||0)>=0?"+":""}${(commStats.avg_r||0).toFixed(2)}R`, (commStats.avg_r||0)>=0?"up":"down"],
                      ["Best trade", `+${commStats.best_trade_r||0}R`, "up"],
                      ["Worst trade", `${commStats.worst_trade_r||0}R`, "down"],
                      ["Total R", `${(commStats.total_r||0)>=0?"+":""}${(commStats.total_r||0).toFixed(1)}R`, (commStats.total_r||0)>=0?"up":"down"],
                    ].map(([lbl,val,cls])=>(
                      <div key={lbl} style={{display:"flex",justifyContent:"space-between",fontSize:12}}>
                        <span style={{color:"#64748b"}}>{lbl}</span>
                        <span className={cls} style={{fontFamily:"monospace"}}>{val}</span>
                      </div>
                    ))}
                  </div>
                )}
                {!commStats.total_closed && <div className="empty">No closed trades yet</div>}
              </div>
            </div>
          )}
        </div>
      )}

      {/* ════════════════════════════════════════
          LIVE LOGS TAB
      ════════════════════════════════════════ */}
      {tab==="logs" && (
        <div>
          <div className="card">
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
              <h2 style={{margin:0}}>Live bot log</h2>
              <div style={{display:"flex",gap:8}}>
                <button className="mode-btn" onClick={()=>setLogs([])}>Clear</button>
                <span style={{fontSize:11,color:"#475569"}}>{logs.length} lines</span>
              </div>
            </div>
            <div className="log-box" ref={logRef}>
              {logs.map((line,i)=>(
                <div key={i} className={`log-line ${logColor(line)}`}>{line}</div>
              ))}
              {!logs.length && <div style={{color:"#475569"}}>Connecting to log stream...</div>}
            </div>
          </div>
          <div className="card">
            <h2>Color guide</h2>
            <div style={{display:"flex",gap:16,fontSize:12,flexWrap:"wrap"}}>
              {[["#22c55e","SIGNAL — trade setup found"],["#93c5fd","TRADE — order placed/closed"],["#f59e0b","WARNING — non-critical issue"],["#ef4444","ERROR — needs attention"],["#64748b","INFO — normal activity"]].map(([c,lbl])=>(
                <div key={c} style={{display:"flex",alignItems:"center",gap:6}}>
                  <span style={{width:10,height:10,borderRadius:"50%",background:c,display:"inline-block"}}></span>
                  <span style={{color:"#94a3b8"}}>{lbl}</span>
                </div>
              ))}
            </div>
          </div>
        </div>
      )}

      {/* ════════════════════════════════════════
          SERVICES TAB
      ════════════════════════════════════════ */}
      {tab==="services" && (
        <div>
          <div className="grid2">
            <div className="card">
              <h2>Process status</h2>
              {services ? (
                [["bot","Trading Bot"],["watchdog","Watchdog"],["dashboard","Dashboard Server"],["cron","Cron Scheduler"]].map(([key,label])=>{
                  const svc = services[key];
                  const running = svc?.running;
                  return (
                    <div key={key} className="svc-row">
                      <div style={{display:"flex",alignItems:"center"}}>
                        <span className="svc-dot" style={{background:running?"#22c55e":"#ef4444"}}></span>
                        <span style={{color:"#e2e8f0"}}>{label}</span>
                      </div>
                      <span className={`badge ${running?"ok":"err"}`}>{running?"RUNNING":"STOPPED"}</span>
                    </div>
                  );
                })
              ) : <div className="empty">Loading...</div>}
              {services?.uptime && (
                <div style={{marginTop:12,fontSize:11,color:"#475569"}}>Bot uptime: {services.uptime}</div>
              )}
            </div>
            <div className="card">
              <h2>Scheduled jobs</h2>
              {services ? (
                [["token_refresh","Token Refresh","11:45 PM IST daily"],["nightly_agent","Nightly Agent","8:30 PM IST daily"],["weekly_agent","Weekly Agent","9:00 AM IST Sunday"]].map(([key,label,schedule])=>{
                  const svc = services[key];
                  return (
                    <div key={key} className="svc-row">
                      <div>
                        <div style={{color:"#e2e8f0",fontSize:12}}>{label}</div>
                        <div style={{color:"#475569",fontSize:10}}>{schedule}</div>
                      </div>
                      <div style={{textAlign:"right"}}>
                        <div style={{fontSize:10,color:"#64748b"}}>Last run</div>
                        <div style={{fontSize:11,color:"#94a3b8"}}>{svc?.last_run||"Never"}</div>
                      </div>
                    </div>
                  );
                })
              ) : <div className="empty">Loading...</div>}
            </div>
          </div>
          <div className="card">
            <h2>Quick commands</h2>
            <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:8}}>
              {[
                ["Run nightly agent","/agents/nightly","POST","Takes 2-5 mins — watch Live Logs"],
                ["Run weekly backtest","/agents/weekly","POST","Takes 10-15 mins — watch Live Logs"],
                ["Refresh daily plan","/plan/refresh","POST","Regenerates today checklist"],
                ["Reset kill switch","/kill-switch/reset","POST","Re-enables trading after kill"],
              ].map(([label,endpoint,method,note])=>(
                <button key={endpoint} className="mode-btn"
                  style={{padding:"10px 14px",textAlign:"left",display:"block",width:"100%",marginBottom:4}}
                  onClick={()=>{
                    fetch(`${API}${endpoint}`,{method}).then(r=>r.json()).then(d=>{
                      alert(d.message || d.ok ? `Started: ${label}\n${note}` : `Error: ${JSON.stringify(d)}`);
                    }).catch(e=>alert(`Error: ${e}`));
                  }}>
                  <div style={{fontWeight:500,color:"#e2e8f0"}}>{label}</div>
                  <div style={{fontSize:10,color:"#64748b",marginTop:2}}>{note}</div>
                </button>
              ))}
            </div>
          </div>
        </div>
      )}

      {/* ════════════════════════════════════════
          BACKTEST TAB
      ════════════════════════════════════════ */}
      {tab==="backtest" && (
        <div>
          {!backtest ? <div className="empty">Loading backtest results...</div>
          : !backtest.available ? (
            <div className="card">
              <div className="empty" style={{padding:40}}>
                <div style={{fontSize:24,marginBottom:12}}>📊</div>
                <div style={{color:"#94a3b8",marginBottom:8}}>{backtest.message||"No backtest results yet"}</div>
                <div style={{fontSize:11,color:"#475569"}}>Run weekly_agent.py to generate backtest results</div>
                <button className="mode-btn" style={{marginTop:14}}
                  onClick={()=>fetch(`${API}/agents/nightly`,{method:"POST"}).then(r=>r.json()).then(d=>alert(d.message||"Started — check Live Logs tab"))}>
                  Run nightly agent (generates backtest results)
                </button>
              </div>
            </div>
          ) : (
            <div>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
                <div style={{fontSize:12,color:"#64748b"}}>Week ending: {backtest.week_ending}</div>
                <div style={{display:"flex",gap:6}}>
                  {Object.keys(backtest.strategies||{}).map(s=>(
                    <button key={s} className={`mode-btn ${btStrat===s?"active":""}`}
                      style={{background:btStrat===s?"#1e3a5f":"",color:btStrat===s?"#93c5fd":""}}
                      onClick={()=>setBtStrat(s)}>{s}</button>
                  ))}
                </div>
              </div>
              {btStrat && backtest.strategies[btStrat] && (() => {
                const st = backtest.strategies[btStrat];
                return (
                  <div>
                    <div className="grid3">
                      <div className="metric"><div className="lbl">Avg profit factor</div>
                        <div className={`val ${st.avg_profit_factor>=1.5?"up":st.avg_profit_factor>=1?"neutral":"down"}`}>{st.avg_profit_factor?.toFixed(2)}</div></div>
                      <div className="metric"><div className="lbl">Top symbols</div>
                        <div style={{fontSize:11,color:"#22c55e",marginTop:4,lineHeight:1.6}}>
                          {(st.top_10||[]).slice(0,5).map(s=>s.replace("NSE:","").replace("-EQ","")).join(", ")}
                        </div></div>
                      <div className="metric"><div className="lbl">Avoid</div>
                        <div style={{fontSize:11,color:"#ef4444",marginTop:4,lineHeight:1.6}}>
                          {(st.avoid||[]).slice(0,5).map(s=>s.replace("NSE:","").replace("-EQ","")).join(", ")}
                        </div></div>
                    </div>
                    <div className="card">
                      <h2>Symbol performance leaderboard</h2>
                      <table className="bt-table">
                        <thead>
                          <tr>
                            <th>Symbol</th><th>Trades</th><th>Win %</th><th>PF</th><th>Sharpe</th><th>Return</th><th>Max DD</th>
                          </tr>
                        </thead>
                        <tbody>
                          {(st.leaderboard||[]).map((r,i)=>(
                            <tr key={i}>
                              <td style={{fontFamily:"monospace",color:"#f1f5f9"}}>{r.symbol.replace("NSE:","").replace("-EQ","")}</td>
                              <td>{r.total_trades}</td>
                              <td className={r.win_rate>=55?"good":r.win_rate>=45?"":"bad"}>{r.win_rate?.toFixed(0)}%</td>
                              <td className={r.profit_factor>=1.5?"good":r.profit_factor>=1?"":"bad"}>{r.profit_factor?.toFixed(2)}</td>
                              <td className={r.sharpe>=1?"good":r.sharpe>=0.5?"":"bad"}>{r.sharpe?.toFixed(2)}</td>
                              <td className={r.total_return>=0?"good":"bad"}>{r.total_return>=0?"+":""}{r.total_return?.toFixed(1)}%</td>
                              <td className={r.max_drawdown>20?"bad":r.max_drawdown>10?"":"good"}>{r.max_drawdown?.toFixed(1)}%</td>
                            </tr>
                          ))}
                        </tbody>
                      </table>
                    </div>
                  </div>
                );
              })()}
            </div>
          )}
        </div>
      )}

    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
